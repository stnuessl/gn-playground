repos:
  - repo: local
    hooks:
      - id: clang-format check
        name: clang-format
        entry: uv run tools/pre-commit/invoke-ninja.py
        args: [gn/clang-format:check]
        language: system
        files: \.(c|cc|hh|[ch](pp|xx))$
        pass_filenames: false

      - id: python check
        name: python check
        entry: uv run tools/pre-commit/invoke-ninja.py
        args: [gn/python:check]
        language: system
        files: \.py$
        pass_filenames: false

      - id: compile-commands check
        name: compile-commands check
        entry: uv run tools/pre-commit/invoke-ninja.py
        args: [gn/compile-commands:check]
        language: system
        files: (.gn|BUILD.gn|\.gni)$
        pass_filenames: false

      - id: metadata check
        name: metadata check
        entry: uv run tools/pre-commit/invoke-ninja.py
        args: [gn/metadata:check]
        language: system
        files: (.gn|BUILD.gn|\.gni)$
        pass_filenames: false

      - id: memmaps check
        name: memmaps check
        entry: uv run tools/pre-commit/invoke-ninja.py
        args: [gn/memmaps:check]
        language: system
        files: .*MemMap.*\.h$
        pass_filenames: false

      - id: gn format check
        name: gn format check
        entry: gn format
        args: [--dry-run]
        language: system
        files: (.gn|BUILD.gn|\.gni)$

      - id: gn target names check
        name: gn target names check
        entry: uv run tools/pre-commit/invoke-ninja.py
        args: [gn/targets:check]
        language: system
        files: (.gn|BUILD.gn|\.gni)$
        pass_filenames: false

      - id: file extension check
        name: file extension check
        entry: uv run tools/pre-commit/check-extension.py
        args: []
        language: system
        files: \..*$

      - id: rstcheck check
        name: rstcheck check
        entry: uv run tools/pre-commit/invoke-ninja.py
        args: [gn/rstcheck:check]
        language: system
        files: \.(ba)?sh$

      - id: shellcheck check
        name: shellcheck check
        entry: shellcheck
        args: []
        language: system
        files: \.(ba)?sh$

