services:
  archlinux-build:
    build:
      context: ./archlinux-build
      dockerfile: Dockerfile
    image: "gn-playground:archlinux-build"
    pull_policy: never
    tty: false
    stdin_open: false
    user: "${USER_ID:-1000}:${GROUP_ID:-1000}"
    working_dir: "/workspace/gn-playground"
    environment:
      - CI
      - GITHUB_JOB
      - GITHUB_REF_NAME
      - GITHUB_RUN_ID
      - GITHUB_SHA
      - SOURCE_DATE_EPOCH
      - UV_CACHE_DIR=/workspace/.uv-cache
      - UV_TOOL_DIR=/workspace/.uv-tools
    volumes:
      - "${PWD}:/workspace/gn-playground"
      - "${HOME}/.cache/uv:/workspace/.uv-cache"
      - "${HOME}/.local/share/uv/tools:/workspace/.uv-tools"
