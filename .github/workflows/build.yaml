name: Build
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * 6"
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        docker_image: [archlinux-build]
    if: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@main
      - name: Prepare filesystem
        run: |
          mkdir -p \
            "${HOME}/.conan2" \
            "${HOME}/.cache/uv" \
            "${HOME}/.local/share/uv/tools"
      - name: Install conan packages
        run: |
          USER_ID="$(id -u)" GROUP_ID="$(id -g)" docker compose \
            -f docker/docker-compose.yaml \
            run --rm ${{ matrix.docker_image }} \
            ninja -C gn/toolchains -f install.ninja ../../.cache/conan/vars.gni
      - name: Configure build system
        run: |
          USER_ID="$(id -u)" GROUP_ID="$(id -g)" docker compose \
            -f docker/docker-compose.yaml \
            run --rm ${{ matrix.docker_image }} \
            gn gen build
      - name: Perform software build
        run: |
          USER_ID="$(id -u)" GROUP_ID="$(id -g)" docker compose \
            -f docker/docker-compose.yaml \
            run --rm ${{ matrix.docker_image }} \
            ninja -C build -k 0 all

